syntax = "proto3";

package tinkoff.public.invest.api.contract.v1;

import "google/protobuf/timestamp.proto";

service MarketDataStreamService {
  // MarketDataServerSideStream — server-side стрим предоставления биржевой информации
  rpc MarketDataServerSideStream (MarketDataServerSideStreamRequest)
    returns (stream MarketDataResponse);
}

message MarketDataServerSideStreamRequest {
  // Запрос подписки на свечи.
  SubscribeCandlesRequest subscribe_candles_request = 1;
  // Запрос подписки на стаканы.
  SubscribeOrderBookRequest subscribe_order_book_request = 2;
  // Запрос подписки на ленту обезличенных сделок.
  SubscribeTradesRequest subscribe_trades_request = 3;
  // Запрос подписки на торговые статусы инструментов.
  SubscribeInfoRequest subscribe_info_request = 4;
  // Запрос подписки на цены последних сделок.
  SubscribeLastPriceRequest subscribe_last_price_request = 5;
  // Запрос настройки пинга.
  PingDelaySettings ping_settings = 15;

  // subscribeCandles | Изменения статуса подписки на свечи.
  message SubscribeCandlesRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на свечи.
    repeated CandleInstrument instruments = 2;
    // Флаг ожидания закрытия временного интервала для отправки свечи.
    bool waiting_close = 3;
    // Источник свечей.
    optional CandleSource candle_source_type = 9;

    // Тип операции со списком подписок.
    enum SubscriptionAction {
      // Статус подписки не определен.
      SUBSCRIPTION_ACTION_UNSPECIFIED = 0;
      // Подписаться.
      SUBSCRIPTION_ACTION_SUBSCRIBE = 1;
      // Отписаться.
      SUBSCRIPTION_ACTION_UNSUBSCRIBE = 2;
    }

    // Запрос изменения статус подписки на свечи.
    message CandleInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте `instrument_id`.
      string figi = 1 [deprecated = true];
      // Интервал свечей. Двухчасовые и четырехчасовые свечи в стриме отсчитываются с 0:00 по UTC.
      SubscriptionInterval interval = 2;
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 3;

      // Интервал свечи.
      enum SubscriptionInterval {
        // Интервал свечи не определен.
        SUBSCRIPTION_INTERVAL_UNSPECIFIED = 0;
        // Минутные свечи.
        SUBSCRIPTION_INTERVAL_ONE_MINUTE = 1;
        // Пятиминутные свечи.
        SUBSCRIPTION_INTERVAL_FIVE_MINUTES = 2;
        // Пятнадцатиминутные свечи.
        SUBSCRIPTION_INTERVAL_FIFTEEN_MINUTES = 3;
        // Часовые свечи.
        SUBSCRIPTION_INTERVAL_ONE_HOUR = 4;
        // Дневные свечи.
        SUBSCRIPTION_INTERVAL_ONE_DAY = 5;
        // Двухминутные свечи.
        SUBSCRIPTION_INTERVAL_2_MIN = 6;
        // Трехминутные свечи.
        SUBSCRIPTION_INTERVAL_3_MIN = 7;
        // Десятиминутные свечи.
        SUBSCRIPTION_INTERVAL_10_MIN = 8;
        // Тридцатиминутные свечи.
        SUBSCRIPTION_INTERVAL_30_MIN = 9;
        // Двухчасовые свечи.
        SUBSCRIPTION_INTERVAL_2_HOUR = 10;
        // Четырехчасовые свечи.
        SUBSCRIPTION_INTERVAL_4_HOUR = 11;
        // Недельные свечи.
        SUBSCRIPTION_INTERVAL_WEEK = 12;
        // Месячные свечи.
        SUBSCRIPTION_INTERVAL_MONTH = 13;
      }
    }

    enum CandleSource {
      // Все свечи.
      CANDLE_SOURCE_UNSPECIFIED = 0;
      // Биржевые свечи.
      CANDLE_SOURCE_EXCHANGE = 1;
      // Все свечи с учетом торговли по выходным.
      CANDLE_SOURCE_INCLUDE_WEEKEND = 3;
    }
  }

  // Запрос на изменение статуса подписки на стаканы.
  message SubscribeOrderBookRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на стаканы.
    repeated OrderBookInstrument instruments = 2;

    // Запрос подписки на стаканы.
    message OrderBookInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте `instrument_id`.
      string figi = 1 [deprecated = true];
      // Глубина стакана.
      int32 depth = 2;
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 3;
      // Тип стакана. Значение по умолчанию — `ORDERBOOK_TYPE_ALL`, стакан биржевой и дилера.
      OrderBookType order_book_type = 4;

      enum OrderBookType {
        // Не определен.
        ORDERBOOK_TYPE_UNSPECIFIED = 0;
        // Биржевой стакан.
        ORDERBOOK_TYPE_EXCHANGE = 1;
        // Стакан дилера.
        ORDERBOOK_TYPE_DEALER = 2;
        // Стакан биржевой и дилера.
        ORDERBOOK_TYPE_ALL = 3;
      }
    }
  }

  // Изменение статуса подписки на поток обезличенных сделок.
  message SubscribeTradesRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на поток обезличенных сделок.
    repeated TradeInstrument instruments = 2;
    // Тип источника сделок. Значение по умолчанию — `TRADE_SOURCE_ALL`, все сделки.
    TradeSourceType trade_source = 3;
    // Флаг открытого интереса. **true** - в стриме дополнительно передается информация об открытом интересе для фьючерсов
    bool with_open_interest = 4;

    // Запрос подписки на поток обезличенных сделок.
    message TradeInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте instrument_id`.
      string figi = 1 [deprecated = true];
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 2;
    }

    // Типы источников сделок.
    enum TradeSourceType {
      // Тип источника сделки не определён.
      TRADE_SOURCE_UNSPECIFIED = 0;
      // Биржевые сделки.
      TRADE_SOURCE_EXCHANGE = 1;
      // Сделки дилера.
      TRADE_SOURCE_DEALER = 2;
      // Все сделки.
      TRADE_SOURCE_ALL = 3;
    }
  }

  // Изменение статуса подписки на торговый статус инструмента.
  message SubscribeInfoRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на торговый статус.
    repeated InfoInstrument instruments = 2;

    // Запрос подписки на торговый статус.
    message InfoInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте instrument_id`.
      string figi = 1 [deprecated = true];
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 2;
    }
  }

  // Изменение статуса подписки на цену последней сделки по инструменту.
  message SubscribeLastPriceRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на цену последней сделки.
    repeated LastPriceInstrument instruments = 2;

    // Запрос подписки на последнюю цену.
    message LastPriceInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте instrument_id`.
      string figi = 1 [deprecated = true];
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 2;
    }
  }

  message PingDelaySettings {
    // Задержка (пинг) сообщений:  5000–180 000 миллисекунд. Значение по умолчанию — 120 000.
    optional int32 ping_delay_ms = 15;
  }
}

// Пакет биржевой информации по подписке.
message MarketDataResponse {

  oneof payload {
    // Результат подписки на свечи.
    SubscribeCandlesResponse subscribe_candles_response = 1;
    // Результат подписки на стаканы.
    SubscribeOrderBookResponse subscribe_order_book_response = 2;
    // Результат подписки на поток обезличенных сделок.
    SubscribeTradesResponse subscribe_trades_response = 3;
    // Результат подписки на торговые статусы инструментов.
    SubscribeInfoResponse subscribe_info_response = 4;
    // Свеча.
    Candle candle = 5;
    // Сделки.
    Trade trade = 6;
    // Стакан.
    OrderBook orderbook = 7;
    // Торговый статус.
    TradingStatus trading_status = 8;
    // Проверка активности стрима.
    Ping ping = 9;
    // Результат подписки на цены последние сделок по инструментам.
    SubscribeLastPriceResponse subscribe_last_price_response = 10;
    // Цена последней сделки.
    LastPrice last_price = 11;
    // Открытый интерес.
    OpenInterest open_interest = 12;
  }

  // Результат изменения статус подписки на свечи.
  message SubscribeCandlesResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на свечи.
    repeated CandleSubscription candles_subscriptions = 2;

    // Статус подписки на свечи.
    message CandleSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Интервал свечей.
      SubscriptionInterval interval = 2;
      // Статус подписки.
      SubscriptionStatus subscription_status = 3;
      // UID инструмента.
      string instrument_uid = 4;
      // Флаг ожидания закрытия временного интервала для отправки свечи.
      bool waiting_close = 5;
      // Идентификатор открытого соединения.
      string stream_id = 6;
      // Идентификатор подписки в формате `UUID`.
      string subscription_id = 7;
      // Действие подписки.
      SubscriptionAction subscription_action = 8;
      // Источник свечей.
      optional CandleSource candle_source_type = 9;

      // Тикер инструмента.
      string ticker = 10;
      // Класс-код (секция торгов).
      string class_code = 11;

      // Результат подписки.
      enum SubscriptionStatus {
        // Статус подписки не определен.
        SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
        // Успешно.
        SUBSCRIPTION_STATUS_SUCCESS = 1;
        // Инструмент не найден.
        SUBSCRIPTION_STATUS_INSTRUMENT_NOT_FOUND = 2;
        // Некорректный статус подписки. [Список возможных значений](./marketdata#subscriptionaction).
        SUBSCRIPTION_STATUS_SUBSCRIPTION_ACTION_IS_INVALID = 3;
        // Некорректная глубина стакана. Доступные значения — 1, 10, 20, 30, 40, 50.
        SUBSCRIPTION_STATUS_DEPTH_IS_INVALID = 4;
        // Некорректный интервал свечей. [Список возможных значений](./marketdata#subscriptioninterval).
        SUBSCRIPTION_STATUS_INTERVAL_IS_INVALID = 5;
        // Превышен лимит на общее количество подписок в рамках стрима. [Лимитная политика](./limits/).
        SUBSCRIPTION_STATUS_LIMIT_IS_EXCEEDED = 6;
        // Внутренняя ошибка сервиса.
        SUBSCRIPTION_STATUS_INTERNAL_ERROR = 7;
        // Превышен лимит на количество запросов на подписки в течение установленного отрезка времени.
        SUBSCRIPTION_STATUS_TOO_MANY_REQUESTS = 8;
        // Активная подписка не найдена. Ошибка может возникнуть только при отписке от несуществующей подписки.
        SUBSCRIPTION_STATUS_SUBSCRIPTION_NOT_FOUND = 9;
        // Указан некорректный источник.
        SUBSCRIPTION_STATUS_SOURCE_IS_INVALID = 10;
      }
    }
  }

  // Результат изменения статуса подписки на стаканы.
  message SubscribeOrderBookResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на стаканы.
    repeated OrderBookSubscription order_book_subscriptions = 2;

    // Статус подписки.
    message OrderBookSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Глубина стакана.
      int32 depth = 2;
      // Статус подписки.
      SubscriptionStatus subscription_status = 3;
      // UID инструмента.
      string instrument_uid = 4;
      // Идентификатор открытого соединения.
      string stream_id = 5;
      // Идентификатор подписки в формате `UUID`.
      string subscription_id = 6;
      // Тип стакана.
      OrderBookType order_book_type = 7;
      // Действие подписки.
      SubscriptionAction subscription_action = 8;
      // Тикер инструмента.
      string ticker = 9;
      // Класс-код (секция торгов).
      string class_code = 10;
    }
  }

  // Результат изменения статуса подписки на поток обезличенных сделок.
  message SubscribeTradesResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на поток сделок.
    repeated TradeSubscription trade_subscriptions = 2;
    // Тип источника сделок.
    TradeSourceType trade_source = 3;

    // Статус подписки.
    message TradeSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Статус подписки.
      SubscriptionStatus subscription_status = 2;
      // UID инструмента.
      string instrument_uid = 3;
      // Идентификатор открытого соединения.
      string stream_id = 4;
      // Идентификатор подписки в формате UUID.
      string subscription_id = 5;
      // Флаг открытого интереса. **true** - в стриме дополнительно передается информация об открытом интересе для фьючерсов
      bool with_open_interest = 6;
      // Действие подписки.
      SubscriptionAction subscription_action = 7;
      // Тикер инструмента.
      string ticker = 8;
      // Класс-код (секция торгов).
      string class_code = 9;
    }
  }

  // Результат изменения статуса подписки на торговый статус.
  message SubscribeInfoResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на торговый статус.
    repeated InfoSubscription info_subscriptions = 2;

    // Статус подписки.
    message InfoSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Статус подписки.
      SubscriptionStatus subscription_status = 2;
      // UID инструмента.
      string instrument_uid = 3;
      // Идентификатор открытого соединения.
      string stream_id = 4;
      // Идентификатор подписки в формате UUID.
      string subscription_id = 5;
      // Действие подписки.
      SubscriptionAction subscription_action = 6;
      // Тикер инструмента.
      string ticker = 7;
      // Класс-код (секция торгов).
      string class_code = 8;
    }
  }

  // Пакет свечей в рамках стрима.
  message Candle {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Интервал свечи.
    SubscriptionInterval interval = 2;
    // Цена открытия за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation open = 3;
    // Максимальная цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation high = 4;
    // Минимальная цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation low = 5;
    // Цена закрытия за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation close = 6;
    // Объем сделок в лотах.
    int64 volume = 7;
    // Время начала интервала свечи по UTC.
    google.protobuf.Timestamp time = 8;
    // Время последней сделки, вошедшей в свечу по UTC.
    google.protobuf.Timestamp last_trade_ts = 9;
    // UID инструмента.
    string instrument_uid = 10;
    // Тикер инструмента.
    string ticker = 11;
    // Класс-код (секция торгов).
    string class_code = 12;
    // Объем торгов на покупку.
    int64 volume_buy = 13;
    // Объём торгов на продажу.
    int64 volume_sell = 14;
    // Источник свечей.
    CandleSource candle_source_type = 19;

    // Котировка — денежная сумма без указания валюты.
    message Quotation {
      // Целая часть суммы, может быть отрицательным числом.
      int64 units = 1;
      // Дробная часть суммы, может быть отрицательным числом.
      int32 nano = 2;
    }

    enum CandleSource {
      // Источник свечей не определен.
      CANDLE_SOURCE_UNSPECIFIED = 0;
      // Биржевые свечи.
      CANDLE_SOURCE_EXCHANGE = 1;
      // Свечи  дилера в результате торговли по выходным.
      CANDLE_SOURCE_DEALER_WEEKEND = 2;
    }
  }

  // Информация о сделке.
  message Trade {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Направление сделки.
    TradeDirection direction = 2;
    // Цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation price = 3;
    // Количество лотов.
    int64 quantity = 4;
    // Время сделки в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 5;
    // UID инструмента.
    string instrument_uid = 6;
    // Тип источника сделки.
    TradeSourceType trade_source = 7;
    // Тикер инструмента.
    string ticker = 8;
    // Класс-код (секция торгов).
    string class_code = 9;

    // Направление сделки.
    enum TradeDirection {
      // Направление сделки не определено.
      TRADE_DIRECTION_UNSPECIFIED = 0;
      // Покупка.
      TRADE_DIRECTION_BUY = 1;
      // Продажа.
      TRADE_DIRECTION_SELL = 2;
    }
  }

  // Пакет стаканов в рамках стрима.
  message OrderBook {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Глубина стакана.
    int32 depth = 2;
    // Флаг консистентности стакана. **false** — не все заявки попали в стакан из-за сетевых задержек или нарушения порядка доставки.
    bool is_consistent = 3;
    // Массив предложений.
    repeated Order bids = 4;
    // Массив спроса.
    repeated Order asks = 5;
    // Время формирования стакана в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 6;
    // Верхний лимит цены за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation limit_up = 7;
    // Нижний лимит цены за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation limit_down = 8;
    // UID инструмента.
    string instrument_uid = 9;
    // Тип стакана.
    OrderBookType order_book_type = 10;
    // Тикер инструмента.
    string ticker = 11;
    // Класс-код (секция торгов).
    string class_code = 12;

    // Массив предложений/спроса.
    message Order {
      // Цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
      Quotation price = 1;
      // Количество в лотах.
      int64 quantity = 2;
    }
  }

  // Пакет изменения торгового статуса.
  message TradingStatus {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Статус торговли инструментом.
    SecurityTradingStatus trading_status = 2;
    // Время изменения торгового статуса по UTC.
    google.protobuf.Timestamp time = 3;
    // Признак доступности выставления лимитной заявки по инструменту.
    bool limit_order_available_flag = 4;
    // Признак доступности выставления рыночной заявки по инструменту.
    bool market_order_available_flag = 5;
    // UID инструмента.
    string instrument_uid = 6;
    // Тикер инструмента.
    string ticker = 7;
    // Класс-код (секция торгов).
    string class_code = 8;

    // Режим торгов инструмента
    enum SecurityTradingStatus {
      // Торговый статус не определен.
      SECURITY_TRADING_STATUS_UNSPECIFIED = 0;
      // Недоступен для торгов.
      SECURITY_TRADING_STATUS_NOT_AVAILABLE_FOR_TRADING = 1;
      // Период открытия торгов.
      SECURITY_TRADING_STATUS_OPENING_PERIOD = 2;
      // Период закрытия торгов.
      SECURITY_TRADING_STATUS_CLOSING_PERIOD = 3;
      // Перерыв в торговле.
      SECURITY_TRADING_STATUS_BREAK_IN_TRADING = 4;
      // Нормальная торговля.
      SECURITY_TRADING_STATUS_NORMAL_TRADING = 5;
      // Аукцион закрытия.
      SECURITY_TRADING_STATUS_CLOSING_AUCTION = 6;
      // Аукцион крупных пакетов.
      SECURITY_TRADING_STATUS_DARK_POOL_AUCTION = 7;
      // Дискретный аукцион.
      SECURITY_TRADING_STATUS_DISCRETE_AUCTION = 8;
      // Аукцион открытия.
      SECURITY_TRADING_STATUS_OPENING_AUCTION_PERIOD = 9;
      // Период торгов по цене аукциона закрытия.
      SECURITY_TRADING_STATUS_TRADING_AT_CLOSING_AUCTION_PRICE = 10;
      // Сессия назначена.
      SECURITY_TRADING_STATUS_SESSION_ASSIGNED = 11;
      // Сессия закрыта.
      SECURITY_TRADING_STATUS_SESSION_CLOSE = 12;
      // Сессия открыта.
      SECURITY_TRADING_STATUS_SESSION_OPEN = 13;
      // Доступна торговля в режиме внутренней ликвидности брокера.
      SECURITY_TRADING_STATUS_DEALER_NORMAL_TRADING = 14;
      // Перерыв торговли в режиме внутренней ликвидности брокера.
      SECURITY_TRADING_STATUS_DEALER_BREAK_IN_TRADING = 15;
      // Недоступна торговля в режиме внутренней ликвидности брокера.
      SECURITY_TRADING_STATUS_DEALER_NOT_AVAILABLE_FOR_TRADING = 16;
    }
  }

  // Проверка активности стрима.
  message Ping {
    // Время проверки.
    google.protobuf.Timestamp time = 1;
    // Идентификатор соединения.
    string stream_id = 2;
    // Время формирования запроса.
    optional google.protobuf.Timestamp ping_request_time = 4;
  }

  // Результат изменения статуса подписки на цену последней сделки.
  message SubscribeLastPriceResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на цену последней сделки.
    repeated LastPriceSubscription last_price_subscriptions = 2;

    // Статус подписки на цену последней сделки.
    message LastPriceSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Статус подписки.
      SubscriptionStatus subscription_status = 2;
      // UID инструмента.
      string instrument_uid = 3;
      // Идентификатор открытого соединения.
      string stream_id = 4;
      // Идентификатор подписки в формате `UUID`.
      string subscription_id = 5;
      // Действие подписки.
      SubscriptionAction subscription_action = 6;
      // Тикер инструмента.
      string ticker = 7;
      // Класс-код (секция торгов).
      string class_code = 8;
    }
  }

  // Информация о цене последней сделки.
  message LastPrice {
    // FIGI инструмента.
    string figi = 1;
    // Цена последней сделки за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation price = 2;
    // Время получения последней цены в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 3;
    // Тикер инструмента.
    string ticker = 9;
    // Класс-код (секция торгов).
    string class_code = 10;
    // UID инструмента.
    string instrument_uid = 11;
    // Тип последней цены.
    LastPriceType last_price_type = 12;

    // Тип последней цены
    enum LastPriceType {
      // Не определен.
      LAST_PRICE_UNSPECIFIED = 0;
      // Цена биржи.
      LAST_PRICE_EXCHANGE = 1;
      // Цена дилера
      LAST_PRICE_DEALER = 2;
    }
  }

  message OpenInterest {
    // UID инструмента.
    string instrument_uid = 1;
    // Время получения открытого интереса в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 2;
    // Открытый интерес.
    int64 open_interest = 3;
    // Тикер инструмента.
    string ticker = 4;
    // Класс-код (секция торгов).
    string class_code = 5;
  }
}

syntax = "proto3";

package tinkoff.public.invest.api.contract.v1;

import "google/protobuf/timestamp.proto";

service MarketDataStreamService {
  // MarketDataStream — bidirectional стрим предоставления биржевой информации
  rpc MarketDataStream (stream MarketDataRequest)
    returns (stream MarketDataResponse);
}

// Запрос подписки или отписки на определенные биржевые данные.
message MarketDataRequest {

  oneof payload {
    // Запрос подписки на свечи.
    SubscribeCandlesRequest subscribe_candles_request = 1;
    // Запрос подписки на стаканы.
    SubscribeOrderBookRequest subscribe_order_book_request = 2;
    // Запрос подписки на ленту обезличенных сделок.
    SubscribeTradesRequest subscribe_trades_request = 3;
    // Запрос подписки на торговые статусы инструментов.
    SubscribeInfoRequest subscribe_info_request = 4;
    // Запрос подписки на цены последних сделок.
    SubscribeLastPriceRequest subscribe_last_price_request = 5;
    // Запрос своих подписок.
    GetMySubscriptions get_my_subscriptions = 6;
    // Запрос проверки активности соединения.
    PingRequest ping = 7;
    // Запрос настройки пинга.
    PingDelaySettings ping_settings = 15;
  }

  // subscribeCandles | Изменения статуса подписки на свечи.
  message SubscribeCandlesRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на свечи.
    repeated CandleInstrument instruments = 2;
    // Флаг ожидания закрытия временного интервала для отправки свечи.
    bool waiting_close = 3;
    // Источник свечей.
    optional CandleSource candle_source_type = 9;

    // Тип операции со списком подписок.
    enum SubscriptionAction {
      // Статус подписки не определен.
      SUBSCRIPTION_ACTION_UNSPECIFIED = 0;
      // Подписаться.
      SUBSCRIPTION_ACTION_SUBSCRIBE = 1;
      // Отписаться.
      SUBSCRIPTION_ACTION_UNSUBSCRIBE = 2;
    }

    // Запрос изменения статус подписки на свечи.
    message CandleInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте `instrument_id`.
      string figi = 1 [deprecated = true];
      // Интервал свечей. Двухчасовые и четырехчасовые свечи в стриме отсчитываются с 0:00 по UTC.
      SubscriptionInterval interval = 2;
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 3;

      // Интервал свечи.
      enum SubscriptionInterval {
        // Интервал свечи не определен.
        SUBSCRIPTION_INTERVAL_UNSPECIFIED = 0;
        // Минутные свечи.
        SUBSCRIPTION_INTERVAL_ONE_MINUTE = 1;
        // Пятиминутные свечи.
        SUBSCRIPTION_INTERVAL_FIVE_MINUTES = 2;
        // Пятнадцатиминутные свечи.
        SUBSCRIPTION_INTERVAL_FIFTEEN_MINUTES = 3;
        // Часовые свечи.
        SUBSCRIPTION_INTERVAL_ONE_HOUR = 4;
        // Дневные свечи.
        SUBSCRIPTION_INTERVAL_ONE_DAY = 5;
        // Двухминутные свечи.
        SUBSCRIPTION_INTERVAL_2_MIN = 6;
        // Трехминутные свечи.
        SUBSCRIPTION_INTERVAL_3_MIN = 7;
        // Десятиминутные свечи.
        SUBSCRIPTION_INTERVAL_10_MIN = 8;
        // Тридцатиминутные свечи.
        SUBSCRIPTION_INTERVAL_30_MIN = 9;
        // Двухчасовые свечи.
        SUBSCRIPTION_INTERVAL_2_HOUR = 10;
        // Четырехчасовые свечи.
        SUBSCRIPTION_INTERVAL_4_HOUR = 11;
        // Недельные свечи.
        SUBSCRIPTION_INTERVAL_WEEK = 12;
        // Месячные свечи.
        SUBSCRIPTION_INTERVAL_MONTH = 13;
      }
    }

    enum CandleSource {
      // Все свечи.
      CANDLE_SOURCE_UNSPECIFIED = 0;
      // Биржевые свечи.
      CANDLE_SOURCE_EXCHANGE = 1;
      // Все свечи с учетом торговли по выходным.
      CANDLE_SOURCE_INCLUDE_WEEKEND = 3;
    }
  }

  // Запрос на изменение статуса подписки на стаканы.
  message SubscribeOrderBookRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на стаканы.
    repeated OrderBookInstrument instruments = 2;

    // Запрос подписки на стаканы.
    message OrderBookInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте `instrument_id`.
      string figi = 1 [deprecated = true];
      // Глубина стакана.
      int32 depth = 2;
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 3;
      // Тип стакана. Значение по умолчанию — `ORDERBOOK_TYPE_ALL`, стакан биржевой и дилера.
      OrderBookType order_book_type = 4;

      enum OrderBookType {
        // Не определен.
        ORDERBOOK_TYPE_UNSPECIFIED = 0;
        // Биржевой стакан.
        ORDERBOOK_TYPE_EXCHANGE = 1;
        // Стакан дилера.
        ORDERBOOK_TYPE_DEALER = 2;
        // Стакан биржевой и дилера.
        ORDERBOOK_TYPE_ALL = 3;
      }
    }
  }

  // Изменение статуса подписки на поток обезличенных сделок.
  message SubscribeTradesRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на поток обезличенных сделок.
    repeated TradeInstrument instruments = 2;
    // Тип источника сделок. Значение по умолчанию — `TRADE_SOURCE_ALL`, все сделки.
    TradeSourceType trade_source = 3;
    // Флаг открытого интереса. **true** - в стриме дополнительно передается информация об открытом интересе для фьючерсов
    bool with_open_interest = 4;

    // Запрос подписки на поток обезличенных сделок.
    message TradeInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте instrument_id`.
      string figi = 1 [deprecated = true];
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 2;
    }

    // Типы источников сделок.
    enum TradeSourceType {
      // Тип источника сделки не определён.
      TRADE_SOURCE_UNSPECIFIED = 0;
      // Биржевые сделки.
      TRADE_SOURCE_EXCHANGE = 1;
      // Сделки дилера.
      TRADE_SOURCE_DEALER = 2;
      // Все сделки.
      TRADE_SOURCE_ALL = 3;
    }
  }

  // Изменение статуса подписки на торговый статус инструмента.
  message SubscribeInfoRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на торговый статус.
    repeated InfoInstrument instruments = 2;

    // Запрос подписки на торговый статус.
    message InfoInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте instrument_id`.
      string figi = 1 [deprecated = true];
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 2;
    }
  }

  // Изменение статуса подписки на цену последней сделки по инструменту.
  message SubscribeLastPriceRequest {
    // Изменение статуса подписки.
    SubscriptionAction subscription_action = 1;
    // Массив инструментов для подписки на цену последней сделки.
    repeated LastPriceInstrument instruments = 2;

    // Запрос подписки на последнюю цену.
    message LastPriceInstrument {
      // Deprecated FIGI-идентификатор инструмента. Используйте instrument_id`.
      string figi = 1 [deprecated = true];
      // Идентификатор инструмента. Принимает значение `figi`, `instrument_uid` или `ticker + '_' + class_code`.
      string instrument_id = 2;
    }
  }

  // Запрос активных подписок. Возвращает по одному сообщению на каждый тип активных подписок — `SubscribeLastPriceResponse`, `SubscribeInfoResponse`, `SubscribeTradesResponse`, `SubscribeOrderBookResponse`, `SubscribeCandlesResponse`.
  message GetMySubscriptions {
  }

  message PingRequest {
    // Время формирования запроса.
    optional google.protobuf.Timestamp time = 1;
  }

  message PingDelaySettings {
    // Задержка (пинг) сообщений:  5000–180 000 миллисекунд. Значение по умолчанию — 120 000.
    optional int32 ping_delay_ms = 15;
  }
}

// Пакет биржевой информации по подписке.
message MarketDataResponse {

  oneof payload {
    // Результат подписки на свечи.
    SubscribeCandlesResponse subscribe_candles_response = 1;
    // Результат подписки на стаканы.
    SubscribeOrderBookResponse subscribe_order_book_response = 2;
    // Результат подписки на поток обезличенных сделок.
    SubscribeTradesResponse subscribe_trades_response = 3;
    // Результат подписки на торговые статусы инструментов.
    SubscribeInfoResponse subscribe_info_response = 4;
    // Свеча.
    Candle candle = 5;
    // Сделки.
    Trade trade = 6;
    // Стакан.
    OrderBook orderbook = 7;
    // Торговый статус.
    TradingStatus trading_status = 8;
    // Проверка активности стрима.
    Ping ping = 9;
    // Результат подписки на цены последние сделок по инструментам.
    SubscribeLastPriceResponse subscribe_last_price_response = 10;
    // Цена последней сделки.
    LastPrice last_price = 11;
    // Открытый интерес.
    OpenInterest open_interest = 12;
  }

  // Результат изменения статус подписки на свечи.
  message SubscribeCandlesResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на свечи.
    repeated CandleSubscription candles_subscriptions = 2;

    // Статус подписки на свечи.
    message CandleSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Интервал свечей.
      SubscriptionInterval interval = 2;
      // Статус подписки.
      SubscriptionStatus subscription_status = 3;
      // UID инструмента.
      string instrument_uid = 4;
      // Флаг ожидания закрытия временного интервала для отправки свечи.
      bool waiting_close = 5;
      // Идентификатор открытого соединения.
      string stream_id = 6;
      // Идентификатор подписки в формате `UUID`.
      string subscription_id = 7;
      // Действие подписки.
      SubscriptionAction subscription_action = 8;
      // Источник свечей.
      optional CandleSource candle_source_type = 9;

      // Тикер инструмента.
      string ticker = 10;
      // Класс-код (секция торгов).
      string class_code = 11;

      // Результат подписки.
      enum SubscriptionStatus {
        // Статус подписки не определен.
        SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
        // Успешно.
        SUBSCRIPTION_STATUS_SUCCESS = 1;
        // Инструмент не найден.
        SUBSCRIPTION_STATUS_INSTRUMENT_NOT_FOUND = 2;
        // Некорректный статус подписки. [Список возможных значений](./marketdata#subscriptionaction).
        SUBSCRIPTION_STATUS_SUBSCRIPTION_ACTION_IS_INVALID = 3;
        // Некорректная глубина стакана. Доступные значения — 1, 10, 20, 30, 40, 50.
        SUBSCRIPTION_STATUS_DEPTH_IS_INVALID = 4;
        // Некорректный интервал свечей. [Список возможных значений](./marketdata#subscriptioninterval).
        SUBSCRIPTION_STATUS_INTERVAL_IS_INVALID = 5;
        // Превышен лимит на общее количество подписок в рамках стрима. [Лимитная политика](./limits/).
        SUBSCRIPTION_STATUS_LIMIT_IS_EXCEEDED = 6;
        // Внутренняя ошибка сервиса.
        SUBSCRIPTION_STATUS_INTERNAL_ERROR = 7;
        // Превышен лимит на количество запросов на подписки в течение установленного отрезка времени.
        SUBSCRIPTION_STATUS_TOO_MANY_REQUESTS = 8;
        // Активная подписка не найдена. Ошибка может возникнуть только при отписке от несуществующей подписки.
        SUBSCRIPTION_STATUS_SUBSCRIPTION_NOT_FOUND = 9;
        // Указан некорректный источник.
        SUBSCRIPTION_STATUS_SOURCE_IS_INVALID = 10;
      }
    }
  }

  // Результат изменения статуса подписки на стаканы.
  message SubscribeOrderBookResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на стаканы.
    repeated OrderBookSubscription order_book_subscriptions = 2;

    // Статус подписки.
    message OrderBookSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Глубина стакана.
      int32 depth = 2;
      // Статус подписки.
      SubscriptionStatus subscription_status = 3;
      // UID инструмента.
      string instrument_uid = 4;
      // Идентификатор открытого соединения.
      string stream_id = 5;
      // Идентификатор подписки в формате `UUID`.
      string subscription_id = 6;
      // Тип стакана.
      OrderBookType order_book_type = 7;
      // Действие подписки.
      SubscriptionAction subscription_action = 8;
      // Тикер инструмента.
      string ticker = 9;
      // Класс-код (секция торгов).
      string class_code = 10;
    }
  }

  // Результат изменения статуса подписки на поток обезличенных сделок.
  message SubscribeTradesResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на поток сделок.
    repeated TradeSubscription trade_subscriptions = 2;
    // Тип источника сделок.
    TradeSourceType trade_source = 3;

    // Статус подписки.
    message TradeSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Статус подписки.
      SubscriptionStatus subscription_status = 2;
      // UID инструмента.
      string instrument_uid = 3;
      // Идентификатор открытого соединения.
      string stream_id = 4;
      // Идентификатор подписки в формате UUID.
      string subscription_id = 5;
      // Флаг открытого интереса. **true** - в стриме дополнительно передается информация об открытом интересе для фьючерсов
      bool with_open_interest = 6;
      // Действие подписки.
      SubscriptionAction subscription_action = 7;
      // Тикер инструмента.
      string ticker = 8;
      // Класс-код (секция торгов).
      string class_code = 9;
    }
  }

  // Результат изменения статуса подписки на торговый статус.
  message SubscribeInfoResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на торговый статус.
    repeated InfoSubscription info_subscriptions = 2;

    // Статус подписки.
    message InfoSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Статус подписки.
      SubscriptionStatus subscription_status = 2;
      // UID инструмента.
      string instrument_uid = 3;
      // Идентификатор открытого соединения.
      string stream_id = 4;
      // Идентификатор подписки в формате UUID.
      string subscription_id = 5;
      // Действие подписки.
      SubscriptionAction subscription_action = 6;
      // Тикер инструмента.
      string ticker = 7;
      // Класс-код (секция торгов).
      string class_code = 8;
    }
  }

  // Пакет свечей в рамках стрима.
  message Candle {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Интервал свечи.
    SubscriptionInterval interval = 2;
    // Цена открытия за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation open = 3;
    // Максимальная цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation high = 4;
    // Минимальная цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation low = 5;
    // Цена закрытия за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation close = 6;
    // Объем сделок в лотах.
    int64 volume = 7;
    // Время начала интервала свечи по UTC.
    google.protobuf.Timestamp time = 8;
    // Время последней сделки, вошедшей в свечу по UTC.
    google.protobuf.Timestamp last_trade_ts = 9;
    // UID инструмента.
    string instrument_uid = 10;
    // Тикер инструмента.
    string ticker = 11;
    // Класс-код (секция торгов).
    string class_code = 12;
    // Объем торгов на покупку.
    int64 volume_buy = 13;
    // Объём торгов на продажу.
    int64 volume_sell = 14;
    // Источник свечей.
    CandleSource candle_source_type = 19;

    // Котировка — денежная сумма без указания валюты.
    message Quotation {
      // Целая часть суммы, может быть отрицательным числом.
      int64 units = 1;
      // Дробная часть суммы, может быть отрицательным числом.
      int32 nano = 2;
    }

    enum CandleSource {
      // Источник свечей не определен.
      CANDLE_SOURCE_UNSPECIFIED = 0;
      // Биржевые свечи.
      CANDLE_SOURCE_EXCHANGE = 1;
      // Свечи  дилера в результате торговли по выходным.
      CANDLE_SOURCE_DEALER_WEEKEND = 2;
    }
  }

  // Информация о сделке.
  message Trade {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Направление сделки.
    TradeDirection direction = 2;
    // Цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation price = 3;
    // Количество лотов.
    int64 quantity = 4;
    // Время сделки в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 5;
    // UID инструмента.
    string instrument_uid = 6;
    // Тип источника сделки.
    TradeSourceType trade_source = 7;
    // Тикер инструмента.
    string ticker = 8;
    // Класс-код (секция торгов).
    string class_code = 9;

    // Направление сделки.
    enum TradeDirection {
      // Направление сделки не определено.
      TRADE_DIRECTION_UNSPECIFIED = 0;
      // Покупка.
      TRADE_DIRECTION_BUY = 1;
      // Продажа.
      TRADE_DIRECTION_SELL = 2;
    }
  }

  // Пакет стаканов в рамках стрима.
  message OrderBook {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Глубина стакана.
    int32 depth = 2;
    // Флаг консистентности стакана. **false** — не все заявки попали в стакан из-за сетевых задержек или нарушения порядка доставки.
    bool is_consistent = 3;
    // Массив предложений.
    repeated Order bids = 4;
    // Массив спроса.
    repeated Order asks = 5;
    // Время формирования стакана в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 6;
    // Верхний лимит цены за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation limit_up = 7;
    // Нижний лимит цены за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation limit_down = 8;
    // UID инструмента.
    string instrument_uid = 9;
    // Тип стакана.
    OrderBookType order_book_type = 10;
    // Тикер инструмента.
    string ticker = 11;
    // Класс-код (секция торгов).
    string class_code = 12;

    // Массив предложений/спроса.
    message Order {
      // Цена за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
      Quotation price = 1;
      // Количество в лотах.
      int64 quantity = 2;
    }
  }

  // Пакет изменения торгового статуса.
  message TradingStatus {
    // FIGI-идентификатор инструмента.
    string figi = 1;
    // Статус торговли инструментом.
    SecurityTradingStatus trading_status = 2;
    // Время изменения торгового статуса по UTC.
    google.protobuf.Timestamp time = 3;
    // Признак доступности выставления лимитной заявки по инструменту.
    bool limit_order_available_flag = 4;
    // Признак доступности выставления рыночной заявки по инструменту.
    bool market_order_available_flag = 5;
    // UID инструмента.
    string instrument_uid = 6;
    // Тикер инструмента.
    string ticker = 7;
    // Класс-код (секция торгов).
    string class_code = 8;

    // Режим торгов инструмента
    enum SecurityTradingStatus {
      // Торговый статус не определен.
      SECURITY_TRADING_STATUS_UNSPECIFIED = 0;
      // Недоступен для торгов.
      SECURITY_TRADING_STATUS_NOT_AVAILABLE_FOR_TRADING = 1;
      // Период открытия торгов.
      SECURITY_TRADING_STATUS_OPENING_PERIOD = 2;
      // Период закрытия торгов.
      SECURITY_TRADING_STATUS_CLOSING_PERIOD = 3;
      // Перерыв в торговле.
      SECURITY_TRADING_STATUS_BREAK_IN_TRADING = 4;
      // Нормальная торговля.
      SECURITY_TRADING_STATUS_NORMAL_TRADING = 5;
      // Аукцион закрытия.
      SECURITY_TRADING_STATUS_CLOSING_AUCTION = 6;
      // Аукцион крупных пакетов.
      SECURITY_TRADING_STATUS_DARK_POOL_AUCTION = 7;
      // Дискретный аукцион.
      SECURITY_TRADING_STATUS_DISCRETE_AUCTION = 8;
      // Аукцион открытия.
      SECURITY_TRADING_STATUS_OPENING_AUCTION_PERIOD = 9;
      // Период торгов по цене аукциона закрытия.
      SECURITY_TRADING_STATUS_TRADING_AT_CLOSING_AUCTION_PRICE = 10;
      // Сессия назначена.
      SECURITY_TRADING_STATUS_SESSION_ASSIGNED = 11;
      // Сессия закрыта.
      SECURITY_TRADING_STATUS_SESSION_CLOSE = 12;
      // Сессия открыта.
      SECURITY_TRADING_STATUS_SESSION_OPEN = 13;
      // Доступна торговля в режиме внутренней ликвидности брокера.
      SECURITY_TRADING_STATUS_DEALER_NORMAL_TRADING = 14;
      // Перерыв торговли в режиме внутренней ликвидности брокера.
      SECURITY_TRADING_STATUS_DEALER_BREAK_IN_TRADING = 15;
      // Недоступна торговля в режиме внутренней ликвидности брокера.
      SECURITY_TRADING_STATUS_DEALER_NOT_AVAILABLE_FOR_TRADING = 16;
    }
  }

  // Проверка активности стрима.
  message Ping {
    // Время проверки.
    google.protobuf.Timestamp time = 1;
    // Идентификатор соединения.
    string stream_id = 2;
    // Время формирования запроса.
    optional google.protobuf.Timestamp ping_request_time = 4;
  }

  // Результат изменения статуса подписки на цену последней сделки.
  message SubscribeLastPriceResponse {
    // Уникальный идентификатор запроса. [Подробнее](./grpc#tracking-id).
    string tracking_id = 1;
    // Массив статусов подписки на цену последней сделки.
    repeated LastPriceSubscription last_price_subscriptions = 2;

    // Статус подписки на цену последней сделки.
    message LastPriceSubscription {
      // FIGI-идентификатор инструмента.
      string figi = 1;
      // Статус подписки.
      SubscriptionStatus subscription_status = 2;
      // UID инструмента.
      string instrument_uid = 3;
      // Идентификатор открытого соединения.
      string stream_id = 4;
      // Идентификатор подписки в формате `UUID`.
      string subscription_id = 5;
      // Действие подписки.
      SubscriptionAction subscription_action = 6;
      // Тикер инструмента.
      string ticker = 7;
      // Класс-код (секция торгов).
      string class_code = 8;
    }
  }

  // Информация о цене последней сделки.
  message LastPrice {
    // FIGI инструмента.
    string figi = 1;
    // Цена последней сделки за 1 инструмент. Чтобы получить стоимость лота, нужно умножить на лотность инструмента. [Подробнее про перевод цен в валюту](./faq_marketdata/#_15).
    Quotation price = 2;
    // Время получения последней цены в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 3;
    // Тикер инструмента.
    string ticker = 9;
    // Класс-код (секция торгов).
    string class_code = 10;
    // UID инструмента.
    string instrument_uid = 11;
    // Тип последней цены.
    LastPriceType last_price_type = 12;

    // Тип последней цены
    enum LastPriceType {
      // Не определен.
      LAST_PRICE_UNSPECIFIED = 0;
      // Цена биржи.
      LAST_PRICE_EXCHANGE = 1;
      // Цена дилера
      LAST_PRICE_DEALER = 2;
    }
  }

  message OpenInterest {
    // UID инструмента.
    string instrument_uid = 1;
    // Время получения открытого интереса в часовом поясе UTC по времени биржи.
    google.protobuf.Timestamp time = 2;
    // Открытый интерес.
    int64 open_interest = 3;
    // Тикер инструмента.
    string ticker = 4;
    // Класс-код (секция торгов).
    string class_code = 5;
  }
}
